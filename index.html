<script>
function showErr(msg) {
  var e = document.getElementById('err');
  if(!e) return;
  e.style.display = 'block';
  e.textContent += (e.textContent ? '\n---\n' : '') + msg;
}
window.addEventListener('error', function(ev) {
  showErr('ERREUR : ' + (ev.message || (ev.target && ev.target.src ? 'Échec de chargement de ' + ev.target.src : 'erreur inconnue')) + (ev.lineno ? ' (ligne ' + ev.lineno + ')' : ''));

});
setTimeout(function() {
  if (!document.getElementById('root').hasChildNodes()) {
    showErr('DIAGNOSTIC : après 5 secondes, rien n\'a été affiché dans la page. React: ' + (typeof React) + ', Babel: ' + (typeof Babel) + ', fetch: ' + (typeof fetch));
  }
}, 5000);
</script>

const MONTHS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

function formatPeriod(p) { const [y, m] = p.split("-"); return `${MONTHS[parseInt(m, 10) - 1]} ${y}`; }
function formatDate(iso) { if (!iso) return "—"; return new Date(iso).toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" }); }

// Calculs de prêt amortissable
function mensualite(capital, tauxAnnuel, dureeMois) {
  if (!capital || !dureeMois) return 0;
  const r = (tauxAnnuel / 100) / 12;
  if (r === 0) return capital / dureeMois;
  return capital * r / (1 - Math.pow(1 + r, -dureeMois));
}
function moisEcoules(dateDebut) {
  const d = new Date(dateDebut); const now = new Date();
  return Math.max(0, (now.getFullYear() - d.getFullYear()) * 12 + (now.getMonth() - d.getMonth()));
}
// Capital restant dû après n mensualités payées
function capitalRestant(capital, tauxAnnuel, dureeMois, moisPayes) {
  const r = (tauxAnnuel / 100) / 12;
  const p = Math.min(moisPayes, dureeMois);
  if (r === 0) return Math.max(0, capital - (capital / dureeMois) * p);
  const m = mensualite(capital, tauxAnnuel, dureeMois);
  const reste = capital * Math.pow(1 + r, p) - m * (Math.pow(1 + r, p) - 1) / r;
  return Math.max(0, reste);
}
function addMonths(dateDebut, n) {
  const d = new Date(dateDebut); d.setMonth(d.getMonth() + n); return d;
}
function eur(n) { return n.toLocaleString("fr-FR", { maximumFractionDigits: 0 }) + " €"; }

// Intérêts d'emprunt payés sur une année civile donnée (somme des parts d'intérêt des mensualités)
function interetsAnnee(credit, annee) {
  const r = (credit.taux / 100) / 12;
  const m = mensualite(credit.capital, credit.taux, credit.dureeMois);
  const debut = new Date(credit.dateDebut);
  let solde = credit.capital;
  let total = 0;
  for (let i = 0; i < credit.dureeMois; i++) {
    const dateEch = new Date(debut.getFullYear(), debut.getMonth() + i, 1);
    const interet = solde * r;
    const capitalRembourse = m - interet;
    if (dateEch.getFullYear() === annee) total += interet;
    solde -= capitalRembourse;
    if (solde <= 0) break;
  }
  return total;
}

// Statut de paiement du mois courant : 'paye' | 'attente' | 'retard'
function statutPaiement(loc, periode) {
  const paye = (loc.quittances || []).some((q) => q.periode === periode);
  if (paye) return "paye";
  const [y, m] = periode.split("-").map(Number);
  const echeance = new Date(y, m - 1, loc.jourEcheance || 5);
  return new Date() > echeance ? "retard" : "attente";
}

function calculFiscal(data, annee) {
  const inYear = (iso) => iso && new Date(iso).getFullYear() === Number(annee);
  const loyers = Object.values(data.locataires).reduce((s, l) => s + (l.quittances || []).filter((q) => inYear(q.datePaiement)).reduce((a, q) => a + q.montant, 0), 0);
  const deps = (data.depenses || []).filter((d) => inYear(d.date));
  // Ventilation des dépenses
  const lower = (s) => (s || "").toLowerCase();
  const taxeFonciere = deps.filter((d) => lower(d.libelle).includes("taxe fonc")).reduce((s, d) => s + d.montant, 0);
  const travaux = deps.filter((d) => lower(d.libelle).startsWith("travaux")).reduce((s, d) => s + d.montant, 0);
  const autresCharges = deps.reduce((s, d) => s + d.montant, 0) - taxeFonciere - travaux;
  const interets = (data.credits || []).reduce((s, c) => s + interetsAnnee(c, Number(annee)), 0);
  const assurance = (data.credits || []).reduce((s, c) => s + (c.assurance || 0) * 12, 0);
  const totalCharges = taxeFonciere + travaux + autresCharges;
  const resultat = loyers - totalCharges - interets - assurance;
  return { loyers, taxeFonciere, travaux, autresCharges, interets, assurance, totalCharges, resultat };
}

// Assure qu'il existe au moins un bien et que chaque locataire/crédit y est rattaché
function migrerBiens(d) {
  const data = { ...d };
  if (!data.biens || Object.keys(data.biens).length === 0) {
    data.biens = { "mes-biens": { id: "mes-biens", nom: "Mes biens", type: "immeuble", adresse: "" } };
  }
  const premierBien = Object.keys(data.biens)[0];
  data.locataires = { ...data.locataires };
  Object.keys(data.locataires).forEach((k) => {
    if (!data.locataires[k].bienId || !data.biens[data.locataires[k].bienId]) {
      data.locataires[k] = { ...data.locataires[k], bienId: premierBien };
    }
  });
  data.credits = (data.credits || []).map((c) => (c.bienId && data.biens[c.bienId]) ? c : { ...c, bienId: premierBien });
  return data;
}

function App() {
  const [data, setData] = useState(null);
  const [session, setSession] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [erreur, setErreur] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        let d = await sbCharger();
        if (!d || Object.keys(d).length === 0) {
          // Base vide : on initialise avec les données de départ
          d = migrerBiens(SEED);
          await sbEnregistrer(d);
        } else {
          d = migrerBiens({ ...SEED, ...d });
        }
        setData(d);
      } catch (e) {
        setErreur("Connexion à la base impossible. Vérifiez votre connexion internet.");
        setData(migrerBiens(SEED));
      } finally { setLoaded(true); }
    })();
  }, []);

  // Resynchronisation toutes les 8 s pour refléter les changements des autres appareils
  useEffect(() => {
    const t = setInterval(async () => {
      try {
        const d = await sbCharger();
        if (d) setData((cur) => JSON.stringify(d) !== JSON.stringify(cur) ? migrerBiens({ ...SEED, ...d }) : cur);
      } catch (e) {}
    }, 8000);
    return () => clearInterval(t);
  }, []);

  const save = useCallback(async (next) => {
    setData(next);
    try { await sbEnregistrer(next); } catch (e) { setErreur("Échec de l'enregistrement. Réessayez."); setTimeout(() => setErreur(null), 4000); }
  }, []);

  if (!loaded || !data) return <Screen><div style={{ color: C.muted }}>Chargement…</div></Screen>;

  return (
    <>
      {erreur && <div style={{ position: "fixed", top: 0, left: 0, right: 0, background: C.danger, color: "#fff", textAlign: "center", padding: "10px", fontSize: 13.5, zIndex: 2000, fontFamily: "'Inter','Helvetica Neue',Arial,sans-serif" }}>{erreur}</div>}
      {!session ? <Login data={data} onLogin={setSession} />
        : session.role === "proprio"
          ? <Proprio data={data} save={save} onLogout={() => setSession(null)} />
          : <Locataire data={data} save={save} locKey={session.key} onLogout={() => setSession(null)} />}
    </>
  );
}

  const tabs = [

function Avenir({ loc }) {
  const total = loc.loyer + (loc.charges || 0);
  const cp = currentPeriod();
  const dejaPaye = (loc.quittances || []).some((q) => q.periode === cp);
  const periode = dejaPaye ? nextPeriod() : cp;
  const [y, m] = periode.split("-").map(Number);
  const echeance = new Date(y, m - 1, loc.jourEcheance || 5);
  const joursRestants = Math.ceil((echeance - new Date()) / 86400000);
  let etat;
  if (joursRestants < 0) etat = { txt: `En retard de ${Math.abs(joursRestants)} jour(s)`, color: C.danger };
  else if (joursRestants === 0) etat = { txt: "À régler aujourd'hui", color: C.warn };
  else etat = { txt: `Dans ${joursRestants} jour(s)`, color: C.accent };
  return (
    <div>
      <SectionTitle>Prochain loyer</SectionTitle>
      <Card style={{ marginBottom: 16, padding: 24 }}>
        <div style={{ fontSize: 13, color: C.muted, marginBottom: 4 }}>{formatPeriod(periode)}</div>
        <div style={{ fontSize: 40, fontWeight: 700, marginBottom: 4 }}>{total} €</div>
        <div style={{ fontSize: 13, color: C.muted }}>Loyer {loc.loyer} €{loc.charges ? ` + charges ${loc.charges} €` : ""}</div>
      </Card>
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ color: C.muted, fontSize: 13.5 }}>Date maximum de paiement</span>
          <span style={{ fontSize: 15, fontWeight: 600 }}>{formatDate(echeance.toISOString())}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}><CalendarClock size={16} color={etat.color} /><span style={{ color: etat.color, fontSize: 14, fontWeight: 600 }}>{etat.txt}</span></div>
      </Card>
    </div>
  );
}

function photoSrc(p) { return typeof p === "string" ? p : p.src; }

// Compresse une image en dataURL JPEG (max 1000px, qualité 0.6)
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const max = 1000;
        let { width, height } = img;
        if (width > max || height > max) {
          if (width > height) { height = Math.round(height * max / width); width = max; }
          else { width = Math.round(width * max / height); height = max; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", 0.6));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function Chat({ data, save, locKey, me, prefill, onPrefillUsed }) {
  const [texte, setTexte] = useState("");
  const [sujet, setSujet] = useState(SUJETS[0]);
  const [photos, setPhotos] = useState([]);
  const [busy, setBusy] = useState(false);
  const [zoom, setZoom] = useState(null);
  const endRef = useRef(null);
  const fileRef = useRef(null);
  useEffect(() => { if (prefill) { setTexte(prefill); onPrefillUsed && onPrefillUsed(); } }, [prefill]);
  const msgs = (data.messages || []).filter((m) => m.locataire === locKey).sort((a, b) => new Date(a.date) - new Date(b.date));
  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs.length]);

  const onPick = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setBusy(true);
    try {
      const imgs = [];
      for (const f of files.slice(0, 4)) { imgs.push(await compressImage(f)); }
      setPhotos((p) => [...p, ...imgs].slice(0, 4));
    } catch (err) { alert("Impossible de charger cette image."); }
    finally { setBusy(false); if (fileRef.current) fileRef.current.value = ""; }
  };

  const send = () => {
    if (!texte.trim() && photos.length === 0) return;
    const msg = { id: uid(), locataire: locKey, from: me, texte: texte.trim(), date: new Date().toISOString(), photos };
    if (me === "locataire") msg.sujet = sujet;
    save({ ...data, messages: [...(data.messages || []), msg] });
    setTexte(""); setPhotos([]); setSujet(SUJETS[0]);
  };

  const sendDemande = (priorite) => {
    const txt = priorite === "urgence"
      ? "🔴 APPEL URGENT demandé. Merci de me rappeler dès que possible."
      : "📅 Demande de rendez-vous. Merci de me proposer un créneau.";
    const msg = { id: uid(), locataire: locKey, from: "locataire", texte: txt, date: new Date().toISOString(), photos: [], priorite, sujet: priorite === "urgence" ? "Appel urgent" : "Demande de rendez-vous" };
    save({ ...data, messages: [...(data.messages || []), msg] });
  };

  return (
    <div>
      <SectionTitle>{me === "locataire" ? "Contacter le propriétaire" : `Échange avec ${data.locataires[locKey].nom}`}</SectionTitle>
      <Card style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ maxHeight: 420, minHeight: 240, overflowY: "auto", padding: 16, display: "flex", flexDirection: "column", gap: 10 }}>
          {msgs.length === 0 && <div style={{ color: C.muted, fontSize: 13.5, textAlign: "center", padding: "40px 0" }}>Aucun message. Écrivez le premier ci-dessous.</div>}
          {msgs.map((m) => {
            const mine = m.from === me;
            const urgent = m.priorite === "urgence";
            const rdv = m.priorite === "rdv";
            const bubbleBg = mine ? C.accent : (urgent ? "#FAE6E2" : rdv ? "#E4EEF6" : C.cardAlt);
            const bubbleFg = mine ? "#fff" : C.text;
            const bubbleBorder = !mine && urgent ? C.danger : !mine && rdv ? C.blue : "transparent";
            return (
              <div key={m.id} style={{ alignSelf: mine ? "flex-end" : "flex-start", maxWidth: "82%" }}>
                <div style={{ background: bubbleBg, color: bubbleFg, padding: "9px 13px", borderRadius: 12, fontSize: 14, lineHeight: 1.4, border: `1px solid ${bubbleBorder}` }}>
                  {m.sujet && <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.03em", opacity: 0.85, marginBottom: 5, color: !mine && urgent ? C.danger : !mine && rdv ? C.blue : "inherit" }}>{urgent ? "🔴" : rdv ? "📅" : "📍"} {m.sujet}</div>}
                  {m.texte && <div>{m.texte}</div>}
                  {m.photos && m.photos.length > 0 && (
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: m.texte ? 8 : 0 }}>
                      {m.photos.map((src, i) => (
                        <img key={i} src={src} alt="pièce jointe" onClick={() => setZoom(src)} style={{ width: 92, height: 92, objectFit: "cover", borderRadius: 8, cursor: "pointer", border: `1px solid rgba(0,0,0,0.15)` }} />
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ fontSize: 10.5, color: C.muted, marginTop: 3, textAlign: mine ? "right" : "left" }}>{m.from === "proprio" ? "Propriétaire" : "Locataire"} · {formatTime(m.date)}</div>
              </div>
            );
          })}
          <div ref={endRef} />
        </div>

        {me === "locataire" && (
          <div style={{ display: "flex", gap: 8, padding: "10px 12px 0" }}>
            <button onClick={() => sendDemande("rdv")} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, background: C.bg, border: `1px solid ${C.blue}`, color: C.blue, padding: "9px", borderRadius: 8, fontSize: 12.5, fontWeight: 600, cursor: "pointer" }}><CalendarClock size={14} /> Demander un RDV</button>
            <button onClick={() => sendDemande("urgence")} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, background: C.bg, border: `1px solid ${C.danger}`, color: C.danger, padding: "9px", borderRadius: 8, fontSize: 12.5, fontWeight: 600, cursor: "pointer" }}><AlertTriangle size={14} /> Appel urgent</button>

                <img src={src} alt="à envoyer" style={{ width: 56, height: 56, objectFit: "cover", borderRadius: 6 }} />
                <button onClick={() => setPhotos((p) => p.filter((_, j) => j !== i))} style={{ position: "absolute", top: -6, right: -6, background: C.danger, border: "none", borderRadius: "50%", width: 18, height: 18, color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}><X size={11} /></button>
              </div>
            ))}

        <div style={{ display: "flex", gap: 8, padding: 12, borderTop: `1px solid ${C.border}`, alignItems: "center" }}>
          <input ref={fileRef} type="file" accept="image/*" multiple onChange={onPick} style={{ display: "none" }} />
          <button onClick={() => fileRef.current?.click()} title="Joindre des photos" style={{ background: C.bg, color: C.accent, border: `1px solid ${C.border}`, borderRadius: 8, padding: "0 12px", height: 42, cursor: "pointer", display: "flex", alignItems: "center" }}><ImagePlus size={18} /></button>
          <textarea rows={1} value={texte} onChange={(e) => setTexte(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }} placeholder={busy ? "Chargement de l'image…" : "Votre message…"} style={{ ...inputStyle, resize: "none" }} />
          <button onClick={send} disabled={busy} style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 8, padding: "0 16px", height: 42, cursor: busy ? "default" : "pointer", opacity: busy ? 0.6 : 1, display: "flex", alignItems: "center" }}><Send size={17} /></button>
        </div>
      </Card>

      {zoom && (
        <div onClick={() => setZoom(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20, cursor: "zoom-out" }}>
          <img src={zoom} alt="agrandissement" style={{ maxWidth: "100%", maxHeight: "100%", borderRadius: 8 }} />
        </div>
      )}
    </div>
  );
}

function Proprio({ data, save, onLogout }) {
  const [tab, setTab] = useState("dashboard");
  const [relanceTo, setRelanceTo] = useState(null);
  const nbDemandes = demandesEnAttente(data).length;
  const tabs = [
    { id: "dashboard", label: "Paiements", icon: LayoutGrid },
    { id: "locataires", label: "Locataires", icon: UserPlus },
    { id: "finances", label: "Finances", icon: TrendingUp },
    { id: "travaux", label: "Travaux", icon: Wrench },
    { id: "echeancier", label: "Échéancier", icon: CalendarDays },
    { id: "documents", label: "Documents", icon: FileText },
    { id: "messages", label: "Messages", icon: MessageCircle, badge: nbDemandes || null },
  ];
  const goRelance = (key) => { setRelanceTo(key); setTab("messages"); };
  const marquerPaye = (key) => {
    const cp = currentPeriod();
    const loc = data.locataires[key];
    if ((loc.quittances || []).some((q) => q.periode === cp)) return;
    const q = { id: uid(), periode: cp, montant: loc.loyer + (loc.charges || 0), datePaiement: new Date().toISOString().slice(0, 10) };
    save({ ...data, locataires: { ...data.locataires, [key]: { ...loc, quittances: [...(loc.quittances || []), q] } } });
  };
  const aucunLoc = Object.keys(data.locataires).length === 0;
  const needsLoc = ["dashboard", "finances", "travaux", "echeancier", "documents", "messages"];
  const blocked = aucunLoc && needsLoc.includes(tab);
  return (
    <Shell accentLabel="Espace propriétaire" title="Tableau de bord" tabs={tabs} tab={tab} setTab={setTab} onLogout={onLogout}>
      {blocked && (
        <Card><div style={{ color: C.muted, fontSize: 14, lineHeight: 1.5 }}>Aucun locataire pour l'instant. Allez dans l'onglet <strong style={{ color: C.text }}>Locataires</strong> pour en créer un.</div></Card>
      )}
      {!blocked && tab === "dashboard" && <Dashboard data={data} onRelance={goRelance} onMarquerPaye={marquerPaye} />}
      {tab === "locataires" && <ProprioLocataires data={data} save={save} />}
      {!blocked && tab === "finances" && <><ProprioFinances data={data} save={save} /><div style={{ height: 8 }} /><ProprioBanque data={data} save={save} /><div style={{ height: 8 }} /><ProprioImpots data={data} /></>}
      {!blocked && tab === "travaux" && <ProprioTravaux data={data} save={save} />}
      {!blocked && tab === "echeancier" && <ProprioEcheancier data={data} />}
      {!blocked && tab === "documents" && <ProprioDocuments data={data} save={save} />}
      {!blocked && tab === "messages" && <ProprioMessages data={data} save={save} relanceTo={relanceTo} clearRelance={() => setRelanceTo(null)} />}
    </Shell>
  );
}

function DashboardSynthese({ data }) {
  const cp = currentPeriod();
  const locs = Object.values(data.locataires);
  const attendu = locs.reduce((s, l) => s + l.loyer + (l.charges || 0), 0);
  const encaisse = locs.reduce((s, l) => {
    const q = (l.quittances || []).find((x) => x.periode === cp);
    return s + (q ? q.montant : 0);
  }, 0);
  const nbPaye = locs.filter((l) => statutPaiement(l, cp) === "paye").length;
  const mensualitesCredit = (data.credits || []).reduce((s, c) => s + mensualite(c.capital, c.taux, c.dureeMois) + (c.assurance || 0), 0);
  const depMensuel = (data.depenses || []).reduce((s, d) => s + d.montant, 0) / 12;
  const cashflow = attendu - mensualitesCredit - depMensuel;
  const travauxUrgents = (data.travaux || []).filter((t) => t.priorite === "urgent" && t.statut !== "termine").length;
  const demandes = demandesEnAttente(data).length;

  const Tile = ({ label, value, sub, color }) => (
    <div style={{ flex: "1 1 140px", background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "14px 16px" }}>
      <div style={{ fontSize: 10.5, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 21, fontWeight: 700, color: color || C.text }}>{value}</div>
      {sub && <div style={{ fontSize: 11.5, color: C.muted, marginTop: 2 }}>{sub}</div>}
    </div>
  );

  return (
    <div style={{ marginBottom: 26 }}>
      <SectionTitle>Synthèse — {formatPeriod(cp)}</SectionTitle>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Tile label="Loyers encaissés" value={eur(encaisse)} sub={`sur ${eur(attendu)} attendus`} color={encaisse >= attendu ? C.accent : C.warn} />
        <Tile label="Paiements" value={`${nbPaye}/${locs.length}`} sub="logements à jour" color={nbPaye === locs.length ? C.accent : C.warn} />
        <Tile label="Cash-flow net" value={`${cashflow >= 0 ? "+" : ""}${eur(cashflow)}`} sub="par mois" color={cashflow >= 0 ? C.accent : C.danger} />
        {(travauxUrgents > 0 || demandes > 0) && (
          <Tile label="À traiter" value={travauxUrgents + demandes} sub={`${demandes} demande(s), ${travauxUrgents} urgence(s)`} color={C.danger} />
        )}
      </div>
    </div>
  );
}

              <Metric label="Échéance" value={`le ${loc.jourEcheance} du mois`} />

            </div>

              <div style={{ display: "flex", alignItems: "center", gap: 7, marginTop: 12, fontSize: 12.5, color: C.blue }}>
                <CalendarClock size={14} /> Sortie prévue le {formatDate(loc.sortieDate)} (dans {joursAvant(loc.sortieDate)} j)
              </div>

            {statut === "paye" && (() => {
              const q = (loc.quittances || []).find((x) => x.periode === cp);
              return q ? (

                  <Check size={14} /> Marquer payé
                </button>
                <button onClick={() => onRelance(key)} style={{ display: "flex", alignItems: "center", gap: 7, background: "transparent", border: `1px solid ${statut === "retard" ? C.danger : C.warn}`, color: statut === "retard" ? C.danger : C.warn, padding: "8px 14px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>

function Metric({ label, value }) {

}

function ProprioTravaux({ data, save }) {
  const keys = Object.keys(data.locataires);
  const blank = { locataire: keys[0] || "", titre: "", categorie: TRAVAUX_CATEGORIES[0], note: "", priorite: "normal", artisan: "", artisanTel: "", cout: "", datePrevue: "", dateRealisee: "", photos: [] };
  const [form, setForm] = useState(blank);
  const [open, setOpen] = useState(false);
  const [editId, setEditId] = useState(null);
  const [busy, setBusy] = useState(false);
  const [zoom, setZoom] = useState(null);
  const [filtre, setFiltre] = useState("tous"); // tous | prevu | encours | termine
  const fileRef = useRef(null);
  const STAT = { prevu: { l: "Prévu", c: C.warn }, encours: { l: "En cours", c: C.blue }, termine: { l: "Terminé", c: C.accent } };

  const startCreate = () => { setForm({ ...blank, locataire: keys[0] || "" }); setEditId(null); setOpen(true); };
  const startEdit = (t) => {
    setForm({ locataire: t.locataire, titre: t.titre, categorie: t.categorie || TRAVAUX_CATEGORIES[0], note: t.note || "", priorite: t.priorite || "normal", artisan: t.artisan || "", artisanTel: t.artisanTel || "", cout: t.cout || "", datePrevue: t.datePrevue || "", dateRealisee: t.dateRealisee || "", photos: t.photos || [] });
    setEditId(t.id); setOpen(true);
  };

  const labelRef = useRef("");
  const onPick = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setBusy(true);
    try { const imgs = []; for (const f of files.slice(0, 4)) imgs.push({ src: await compressImage(f), label: labelRef.current }); setForm((p) => ({ ...p, photos: [...p.photos, ...imgs].slice(0, 8) })); }
    catch { alert("Impossible de charger cette image."); }
    finally { setBusy(false); if (fileRef.current) fileRef.current.value = ""; }
  };
  const pickWith = (label) => { labelRef.current = label; fileRef.current?.click(); };

  // Synchronise une dépense liée au travail (créée/màj si coût + terminé)
  const syncDepense = (travail, depenses) => {
    let dep = depenses.filter((d) => d.travailId !== travail.id);
    if (travail.cout && Number(travail.cout) > 0 && travail.statut === "termine") {
      dep.push({ id: uid(), travailId: travail.id, locataire: travail.locataire, libelle: `Travaux : ${travail.titre}`, montant: Number(travail.cout), date: travail.dateRealisee || new Date().toISOString().slice(0, 10) });
    }
    return dep;
  };

  const submit = (e) => {
    e.preventDefault();
    if (!form.titre.trim()) return;
    const base = { locataire: form.locataire, titre: form.titre.trim(), categorie: form.categorie, note: form.note.trim(), priorite: form.priorite, artisan: form.artisan.trim(), artisanTel: form.artisanTel.trim(), cout: form.cout, datePrevue: form.datePrevue, dateRealisee: form.dateRealisee, photos: form.photos };
    let travaux, travail;
    if (editId) {
      travail = { ...data.travaux.find((t) => t.id === editId), ...base };
      travaux = data.travaux.map((t) => t.id === editId ? travail : t);
    } else {
      travail = { id: uid(), statut: "prevu", ...base };
      travaux = [...data.travaux, travail];
    }
    save({ ...data, travaux, depenses: syncDepense(travail, data.depenses || []) });
    setOpen(false); setForm(blank); setEditId(null);
  };

  const cycle = (id) => {
    const order = ["prevu", "encours", "termine"];
    const t = data.travaux.find((x) => x.id === id);
    const nouveau = { ...t, statut: order[(order.indexOf(t.statut) + 1) % 3] };
    if (nouveau.statut === "termine" && !nouveau.dateRealisee) nouveau.dateRealisee = new Date().toISOString().slice(0, 10);
    save({ ...data, travaux: data.travaux.map((x) => x.id === id ? nouveau : x), depenses: syncDepense(nouveau, data.depenses || []) });
  };
  const remove = (id) => save({ ...data, travaux: data.travaux.filter((t) => t.id !== id), depenses: (data.depenses || []).filter((d) => d.travailId !== id) });

  // Demandes locataires (messages avec sujet/priorité) non encore converties
  const demandesConvertibles = (data.messages || []).filter((m) => m.from === "locataire" && (m.sujet || m.priorite) && !m.convertiTravail);
  const convertir = (m) => {
    const travail = { id: uid(), statut: "prevu", locataire: m.locataire, titre: m.sujet || "Demande locataire", categorie: TRAVAUX_CATEGORIES[0], note: m.texte || "", priorite: m.priorite === "urgence" ? "urgent" : "normal", artisan: "", artisanTel: "", cout: "", datePrevue: "", dateRealisee: "", photos: m.photos || [] };
    save({ ...data, travaux: [...data.travaux, travail], messages: data.messages.map((x) => x.id === m.id ? { ...x, convertiTravail: true } : x) });
  };

  const liste = filtre === "tous" ? data.travaux : data.travaux.filter((t) => t.statut === filtre);
  const tri = [...liste].sort((a, b) => {
    if ((a.priorite === "urgent") !== (b.priorite === "urgent")) return a.priorite === "urgent" ? -1 : 1;
    return 0;
  });

  return (
    <div>
      {demandesConvertibles.length > 0 && (
        <>
          <SectionTitle>Demandes des locataires</SectionTitle>
          {demandesConvertibles.map((m) => {
            const loc = data.locataires[m.locataire];
            const urgent = m.priorite === "urgence";
            return (
              <Card key={m.id} style={{ marginBottom: 10, borderColor: urgent ? C.danger : C.border }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 11, color: urgent ? C.danger : C.blue, textTransform: "uppercase", marginBottom: 3 }}>{m.sujet || (urgent ? "Urgent" : "Demande")} · {loc?.nom}</div>
                    <div style={{ fontSize: 13.5 }}>{m.texte}</div>
                  </div>
                  <button onClick={() => convertir(m)} style={{ whiteSpace: "nowrap", background: "transparent", border: `1px solid ${C.accent}`, color: C.accent, borderRadius: 8, padding: "7px 12px", fontSize: 12.5, fontWeight: 600, cursor: "pointer" }}>→ Travail</button>
                </div>
              </Card>
            );
          })}
          <div style={{ height: 16 }} />
        </>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <SectionTitle>Travaux</SectionTitle>
        {!open && <button onClick={startCreate} style={{ display: "flex", alignItems: "center", gap: 6, background: C.accent, color: "#fff", border: "none", padding: "9px 14px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer" }}><Plus size={15} /> Ajouter</button>}
      </div>

      {open && (
        <Card style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 14 }}>{editId ? "Modifier le travail" : "Nouveau travail"}</div>
          <form onSubmit={submit}>
            <Field label="Logement"><select value={form.locataire} onChange={(e) => setForm({ ...form, locataire: e.target.value })} style={inputStyle}>{Object.entries(data.locataires).map(([k, l]) => <option key={k} value={k}>{l.logement} — {l.nom}</option>)}</select></Field>
            <Field label="Intitulé"><input value={form.titre} onChange={(e) => setForm({ ...form, titre: e.target.value })} placeholder="Remplacement chauffe-eau" style={inputStyle} /></Field>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="Catégorie"><select value={form.categorie} onChange={(e) => setForm({ ...form, categorie: e.target.value })} style={inputStyle}>{TRAVAUX_CATEGORIES.map((c) => <option key={c}>{c}</option>)}</select></Field>
              <Field label="Priorité"><select value={form.priorite} onChange={(e) => setForm({ ...form, priorite: e.target.value })} style={inputStyle}><option value="normal">Normal</option><option value="urgent">Urgent</option></select></Field>
            </div>
            <Field label="Note"><input value={form.note} onChange={(e) => setForm({ ...form, note: e.target.value })} placeholder="Détails, devis signé…" style={inputStyle} /></Field>

            <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em", margin: "8px 0 12px", paddingTop: 12, borderTop: `1px solid ${C.border}` }}>Artisan & coût</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="Artisan"><input value={form.artisan} onChange={(e) => setForm({ ...form, artisan: e.target.value })} placeholder="Plomberie Martin" style={inputStyle} /></Field>
              <Field label="Téléphone artisan"><input value={form.artisanTel} onChange={(e) => setForm({ ...form, artisanTel: e.target.value })} placeholder="05 45 …" style={inputStyle} /></Field>
            </div>
            <Field label="Coût (€)"><input type="number" value={form.cout} onChange={(e) => setForm({ ...form, cout: e.target.value })} placeholder="450" style={inputStyle} /></Field>
            <div style={{ fontSize: 11.5, color: C.muted, marginBottom: 8 }}>Le coût est ajouté aux dépenses du logement une fois le travail marqué « Terminé ».</div>

            <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em", margin: "8px 0 12px", paddingTop: 12, borderTop: `1px solid ${C.border}` }}>Dates</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="Date prévue"><input type="date" value={form.datePrevue} onChange={(e) => setForm({ ...form, datePrevue: e.target.value })} style={inputStyle} /></Field>
              <Field label="Date réalisée"><input type="date" value={form.dateRealisee} onChange={(e) => setForm({ ...form, dateRealisee: e.target.value })} style={inputStyle} /></Field>
            </div>

            <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em", margin: "8px 0 12px", paddingTop: 12, borderTop: `1px solid ${C.border}` }}>Photos (avant / après)</div>
            <input ref={fileRef} type="file" accept="image/*" multiple onChange={onPick} style={{ display: "none" }} />
            <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
              <button type="button" onClick={() => pickWith("avant")} style={{ display: "flex", alignItems: "center", gap: 6, background: C.bg, border: `1px solid ${C.border}`, color: C.warn, borderRadius: 8, padding: "9px 14px", fontSize: 13, cursor: "pointer" }}><ImagePlus size={15} /> Photo avant</button>
              <button type="button" onClick={() => pickWith("après")} style={{ display: "flex", alignItems: "center", gap: 6, background: C.bg, border: `1px solid ${C.border}`, color: C.accent, borderRadius: 8, padding: "9px 14px", fontSize: 13, cursor: "pointer" }}><ImagePlus size={15} /> Photo après</button>
              <button type="button" onClick={() => pickWith("")} style={{ display: "flex", alignItems: "center", gap: 6, background: C.bg, border: `1px solid ${C.border}`, color: C.muted, borderRadius: 8, padding: "9px 14px", fontSize: 13, cursor: "pointer" }}><ImagePlus size={15} /> Sans étiquette</button>
            </div>
            {busy && <div style={{ fontSize: 12, color: C.muted, marginBottom: 8 }}>Chargement…</div>}
            {form.photos.length > 0 && (
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
                {form.photos.map((p, i) => (
                  <div key={i} style={{ position: "relative" }}>
                    <img src={photoSrc(p)} alt="" style={{ width: 56, height: 56, objectFit: "cover", borderRadius: 6 }} />
                    {photoLabel(p) && <span style={{ position: "absolute", bottom: 2, left: 2, fontSize: 8.5, fontWeight: 700, textTransform: "uppercase", background: photoLabel(p) === "avant" ? C.warn : C.accent, color: "#fff", borderRadius: 3, padding: "1px 4px" }}>{photoLabel(p)}</span>}
                    <button type="button" onClick={() => setForm((pp) => ({ ...pp, photos: pp.photos.filter((_, j) => j !== i) }))} style={{ position: "absolute", top: -6, right: -6, background: C.danger, border: "none", borderRadius: "50%", width: 18, height: 18, color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}><X size={11} /></button>
                  </div>
                ))}
              </div>
            )}

            <div style={{ display: "flex", gap: 10 }}>
              <PrimaryBtn type="submit" icon={Check}>{editId ? "Enregistrer" : "Ajouter"}</PrimaryBtn>
              <button type="button" onClick={() => { setOpen(false); setEditId(null); }} style={{ background: "none", border: `1px solid ${C.border}`, color: C.muted, borderRadius: 8, padding: "0 18px", fontSize: 14, cursor: "pointer" }}>Annuler</button>
            </div>
          </form>
        </Card>
      )}

      <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
        {[["tous", "Tous"], ["prevu", "Prévus"], ["encours", "En cours"], ["termine", "Terminés"]].map(([k, lbl]) => (
          <button key={k} onClick={() => setFiltre(k)} style={{ background: filtre === k ? C.accentDark : C.card, border: `1px solid ${filtre === k ? C.accent : C.border}`, color: filtre === k ? C.accent : C.muted, padding: "6px 12px", borderRadius: 30, fontSize: 12.5, cursor: "pointer" }}>{lbl}</button>
        ))}
      </div>

      {tri.length === 0 ? <Card><span style={{ color: C.muted, fontSize: 14 }}>Aucun travail.</span></Card> : tri.map((t) => {
        const loc = data.locataires[t.locataire]; const s = STAT[t.statut] || STAT.prevu;
        const urgent = t.priorite === "urgent";
        return (
          <Card key={t.id} style={{ marginBottom: 10, borderColor: urgent && t.statut !== "termine" ? C.danger : C.border }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: C.blue, textTransform: "uppercase", marginBottom: 3 }}>{loc?.logement} · {loc?.nom} · {t.categorie}</div>
                <div style={{ fontSize: 15.5, fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}>
                  {urgent && t.statut !== "termine" && <span style={{ fontSize: 10.5, fontWeight: 700, color: "#fff", background: C.danger, borderRadius: 4, padding: "2px 6px" }}>URGENT</span>}
                  {t.titre}
                </div>
                {t.note && <div style={{ fontSize: 13, color: C.muted, marginTop: 3 }}>{t.note}</div>}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => startEdit(t)} style={{ background: "none", border: `1px solid ${C.border}`, color: C.accent, borderRadius: 8, padding: 7, cursor: "pointer", display: "flex" }}><Pencil size={14} /></button>
                <button onClick={() => remove(t.id)} style={{ background: "none", border: `1px solid ${C.border}`, color: C.danger, borderRadius: 8, padding: 7, cursor: "pointer", display: "flex" }}><Trash2 size={14} /></button>
              </div>
            </div>

            {(t.artisan || t.cout || t.datePrevue || t.dateRealisee) && (
              <div style={{ display: "flex", gap: 20, flexWrap: "wrap", marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.border}` }}>
                {t.artisan && <Metric label="Artisan" value={t.artisan + (t.artisanTel ? ` · ${t.artisanTel}` : "")} />}
                {t.cout > 0 && <Metric label="Coût" value={eur(Number(t.cout))} />}
                {t.datePrevue && <Metric label="Prévu" value={formatDate(t.datePrevue)} />}
                {t.dateRealisee && <Metric label="Réalisé" value={formatDate(t.dateRealisee)} />}
              </div>
            )}

            {t.photos && t.photos.length > 0 && (
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 12 }}>
                {t.photos.map((p, i) => (
                  <div key={i} style={{ position: "relative" }}>
                    <img src={photoSrc(p)} alt="" onClick={() => setZoom(photoSrc(p))} style={{ width: 70, height: 70, objectFit: "cover", borderRadius: 6, cursor: "pointer" }} />
                    {photoLabel(p) && <span style={{ position: "absolute", bottom: 2, left: 2, fontSize: 8.5, fontWeight: 700, textTransform: "uppercase", background: photoLabel(p) === "avant" ? C.warn : C.accent, color: "#fff", borderRadius: 3, padding: "1px 4px" }}>{photoLabel(p)}</span>}
                  </div>
                ))}
              </div>
            )}

            <button onClick={() => cycle(t.id)} style={{ marginTop: 12, background: "transparent", border: `1px solid ${s.c}`, color: s.c, padding: "5px 12px", borderRadius: 30, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{s.l} ↻</button>
          </Card>
        );
      })}

      {zoom && (
        <div onClick={() => setZoom(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20, cursor: "zoom-out" }}>
          <img src={zoom} alt="" style={{ maxWidth: "100%", maxHeight: "100%", borderRadius: 8 }} />
        </div>
      )}
    </div>
  );
}

function ProprioDocuments({ data, save }) {
  const keys = Object.keys(data.locataires);

  // --- Module Quittances ---
  const [qForm, setQForm] = useState({ locataire: keys[0], periode: currentPeriod(), montant: "", datePaiement: new Date().toISOString().slice(0, 10) });
  useEffect(() => {
    const l = data.locataires[qForm.locataire];
    setQForm((f) => ({ ...f, montant: String((l.loyer || 0) + (l.charges || 0)) }));
  }, [qForm.locataire]);
  const emettre = (e) => {
    e.preventDefault();
    if (!qForm.montant) return;
    const loc = data.locataires[qForm.locataire];
    if ((loc.quittances || []).some((q) => q.periode === qForm.periode)) return alert("Une quittance existe déjà pour ce mois.");
    const q = { id: uid(), periode: qForm.periode, montant: Number(qForm.montant), datePaiement: qForm.datePaiement };
    save({ ...data, locataires: { ...data.locataires, [qForm.locataire]: { ...loc, quittances: [...(loc.quittances || []), q] } } });
  };
  const periodes = [];
  const d = new Date();
  for (let i = -1; i < 6; i++) { const x = new Date(d.getFullYear(), d.getMonth() - i, 1); periodes.push(`${x.getFullYear()}-${String(x.getMonth() + 1).padStart(2, "0")}`); }
  const locQ = data.locataires[qForm.locataire];
  const emises = [...(locQ.quittances || [])].sort((a, b) => b.periode.localeCompare(a.periode));

  // --- Module Partage de documents ---
  const [dForm, setDForm] = useState({ locataire: keys[0], type: DOC_TYPES[0], nom: "" });
  const addDoc = (e) => {
    e.preventDefault();
    if (!dForm.nom.trim()) return;
    save({ ...data, documents: [...data.documents, { id: uid(), ...dForm, date: new Date().toISOString() }] });
    setDForm({ ...dForm, nom: "" });
  };
  const removeDoc = (id) => save({ ...data, documents: data.documents.filter((d) => d.id !== id) });

  return (
    <div>
      {/* 1. Quittances */}
      <SectionTitle>Émettre une quittance</SectionTitle>
      <Card style={{ marginBottom: 16 }}>
        <form onSubmit={emettre}>
          <Field label="Locataire"><select value={qForm.locataire} onChange={(e) => setQForm({ ...qForm, locataire: e.target.value })} style={inputStyle}>{Object.entries(data.locataires).map(([k, l]) => <option key={k} value={k}>{l.nom}</option>)}</select></Field>
          <Field label="Mois"><select value={qForm.periode} onChange={(e) => setQForm({ ...qForm, periode: e.target.value })} style={inputStyle}>{periodes.map((p) => <option key={p} value={p}>{formatPeriod(p)}</option>)}</select></Field>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Field label="Montant (€)"><input type="number" value={qForm.montant} onChange={(e) => setQForm({ ...qForm, montant: e.target.value })} style={inputStyle} /></Field>
            <Field label="Date de paiement"><input type="date" value={qForm.datePaiement} onChange={(e) => setQForm({ ...qForm, datePaiement: e.target.value })} style={inputStyle} /></Field>
          </div>
          <PrimaryBtn type="submit" icon={Receipt}>Émettre la quittance</PrimaryBtn>
        </form>
      </Card>
      <Card style={{ marginBottom: 32 }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Quittances émises — {locQ.nom}</div>
        {emises.length === 0 ? <span style={{ color: C.muted, fontSize: 13.5 }}>Aucune quittance.</span> : emises.map((q) => (
          <div key={q.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderTop: `1px solid ${C.border}` }}>
            <div><div style={{ fontSize: 14.5, fontWeight: 600 }}>{formatPeriod(q.periode)}</div><div style={{ fontSize: 12, color: C.muted }}>Payé le {formatDate(q.datePaiement)} · {q.montant} €</div></div>
            <button onClick={() => printQuittance(locQ, q, data.bailleur)} style={{ display: "flex", alignItems: "center", gap: 6, background: "transparent", border: `1px solid ${C.accent}`, color: C.accent, padding: "7px 12px", borderRadius: 8, fontSize: 12.5, cursor: "pointer" }}><Download size={14} /> PDF</button>
          </div>
        ))}
      </Card>

      {/* 2. Partage de documents */}
      <SectionTitle>Partager un document</SectionTitle>
      <Card style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 12.5, color: C.muted, marginBottom: 14 }}>Référencez ici un document destiné à un locataire (le fichier reste sur votre Drive/e-mail, ceci en garde la trace partagée).</div>
        <form onSubmit={addDoc}>
          <Field label="Destinataire"><select value={dForm.locataire} onChange={(e) => setDForm({ ...dForm, locataire: e.target.value })} style={inputStyle}>{Object.entries(data.locataires).map(([k, l]) => <option key={k} value={k}>{l.nom} ({l.logement})</option>)}</select></Field>
          <Field label="Type"><select value={dForm.type} onChange={(e) => setDForm({ ...dForm, type: e.target.value })} style={inputStyle}>{DOC_TYPES.map((t) => <option key={t}>{t}</option>)}</select></Field>
          <Field label="Nom / référence"><input value={dForm.nom} onChange={(e) => setDForm({ ...dForm, nom: e.target.value })} placeholder="Bail signé 2026, attestation assurance…" style={inputStyle} /></Field>
          <PrimaryBtn type="submit" icon={FilePlus}>Ajouter au dossier</PrimaryBtn>
        </form>
      </Card>

      {/* 3. Documents par locataire */}
      <SectionTitle>Documents par locataire</SectionTitle>
      {Object.entries(data.locataires).map(([k, l]) => {
        const docs = data.documents.filter((doc) => doc.locataire === k);
        return (
          <Card key={k} style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: docs.length ? 12 : 0 }}>{l.nom} <span style={{ color: C.muted, fontWeight: 400 }}>· {l.logement}</span></div>
            {docs.length === 0 ? <span style={{ color: C.muted, fontSize: 13 }}>Aucun document.</span> : docs.map((doc) => (
              <div key={doc.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 0", borderTop: `1px solid ${C.border}` }}>
                <div><span style={{ fontSize: 11, color: C.blue, textTransform: "uppercase" }}>{doc.type}</span><div style={{ fontSize: 14 }}>{doc.nom}</div><div style={{ fontSize: 11.5, color: C.muted }}>{formatDate(doc.date)}</div></div>
                <button onClick={() => removeDoc(doc.id)} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer" }}><Trash2 size={14} /></button>
              </div>
            ))}
          </Card>
        );
      })}
    </div>
  );
}

function ProprioBanque({ data, save }) {
  const credits = data.credits || [];
  const [open, setOpen] = useState(false);
  const bienKeys = Object.keys(data.biens || {});
  const blank = { banque: "", objet: "", capital: "", taux: "", dureeMois: "", dateDebut: new Date().toISOString().slice(0, 10), assurance: "", bienId: bienKeys[0] || "" };
  const [form, setForm] = useState(blank);

  const add = (e) => {
    e.preventDefault();
    if (!form.capital || !form.taux || !form.dureeMois) return;
    const c = { id: uid(), bienId: form.bienId, banque: form.banque, objet: form.objet, capital: Number(form.capital), taux: Number(form.taux), dureeMois: Number(form.dureeMois), dateDebut: form.dateDebut, assurance: Number(form.assurance) || 0 };
    save({ ...data, credits: [...credits, c] });
    setForm(blank); setOpen(false);
  };
  const remove = (id) => save({ ...data, credits: credits.filter((c) => c.id !== id) });

  // Totaux consolidés
  let totalMensualite = 0, totalRestant = 0, totalEmprunte = 0;
  credits.forEach((c) => {
    const m = mensualite(c.capital, c.taux, c.dureeMois) + (c.assurance || 0);
    const payes = moisEcoules(c.dateDebut);
    totalMensualite += m;
    totalRestant += capitalRestant(c.capital, c.taux, c.dureeMois, payes);
    totalEmprunte += c.capital;
  });

  return (
    <div>
      <SectionTitle>Synthèse bancaire</SectionTitle>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
        <Card><div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 6 }}>Capital restant dû</div><div style={{ fontSize: 24, fontWeight: 700, color: C.warn }}>{eur(totalRestant)}</div><div style={{ fontSize: 12, color: C.muted, marginTop: 3 }}>sur {eur(totalEmprunte)} emprunté</div></Card>
        <Card><div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 6 }}>Mensualités totales</div><div style={{ fontSize: 24, fontWeight: 700, color: C.accent }}>{eur2(totalMensualite)}</div><div style={{ fontSize: 12, color: C.muted, marginTop: 3 }}>par mois, tous crédits</div></Card>
      </div>

      <div style={{ marginBottom: 24 }}>
        <button onClick={() => setOpen(!open)} style={{ background: "none", border: `1px solid ${C.border}`, color: C.accent, padding: "9px 14px", borderRadius: 8, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
          <Plus size={14} /> Ajouter un crédit
        </button>
      </div>
      {open && (
        <Card style={{ marginBottom: 24 }}>
          <form onSubmit={add}>
            <Field label="Bien financé"><select value={form.bienId} onChange={(e) => setForm({ ...form, bienId: e.target.value })} style={inputStyle}>{Object.values(data.biens).map((b) => <option key={b.id} value={b.id}>{b.nom}</option>)}</select></Field>
            <Field label="Banque"><input value={form.banque} onChange={(e) => setForm({ ...form, banque: e.target.value })} placeholder="Crédit Agricole Charente-Périgord" style={inputStyle} /></Field>
            <Field label="Objet"><input value={form.objet} onChange={(e) => setForm({ ...form, objet: e.target.value })} placeholder="Achat appartement" style={inputStyle} /></Field>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="Capital emprunté (€)"><input type="number" value={form.capital} onChange={(e) => setForm({ ...form, capital: e.target.value })} placeholder="185000" style={inputStyle} /></Field>
              <Field label="Taux annuel (%)"><input type="number" step="0.01" value={form.taux} onChange={(e) => setForm({ ...form, taux: e.target.value })} placeholder="3.8" style={inputStyle} /></Field>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="Durée (mois)"><input type="number" value={form.dureeMois} onChange={(e) => setForm({ ...form, dureeMois: e.target.value })} placeholder="240" style={inputStyle} /></Field>
              <Field label="Assurance / mois (€)"><input type="number" value={form.assurance} onChange={(e) => setForm({ ...form, assurance: e.target.value })} placeholder="0" style={inputStyle} /></Field>
            </div>
            <Field label="Date de début"><input type="date" value={form.dateDebut} onChange={(e) => setForm({ ...form, dateDebut: e.target.value })} style={inputStyle} /></Field>
            <PrimaryBtn type="submit" icon={Plus}>Enregistrer le crédit</PrimaryBtn>
          </form>
        </Card>
      )}

      <SectionTitle>Mes crédits</SectionTitle>
      {credits.length === 0 ? <Card><span style={{ color: C.muted, fontSize: 14 }}>Aucun crédit enregistré.</span></Card> : credits.map((c) => {
        const mBase = mensualite(c.capital, c.taux, c.dureeMois);
        const mTot = mBase + (c.assurance || 0);
        const payes = moisEcoules(c.dateDebut);
        const restant = capitalRestant(c.capital, c.taux, c.dureeMois, payes);
        const restantes = Math.max(0, c.dureeMois - payes);
        const coutTotal = mBase * c.dureeMois;
        const interets = coutTotal - c.capital;
        const pct = Math.min(100, Math.round((1 - restant / c.capital) * 100));
        // Prochaines échéances
        const next = [];
        for (let i = 0; i < 3; i++) {
          const idx = payes + i;
          if (idx >= c.dureeMois) break;
          next.push({ date: addMonths(c.dateDebut, idx), montant: mTot });
        }
        return (
          <Card key={c.id} style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
              <div>
                <div style={{ fontSize: 11, color: C.blue, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 3 }}>{c.banque || "Crédit"}{data.biens[c.bienId] ? ` · ${data.biens[c.bienId].nom}` : ""}</div>
                <div style={{ fontSize: 16, fontWeight: 600 }}>{c.objet || "Prêt"}</div>
                <div style={{ fontSize: 12.5, color: C.muted, marginTop: 2 }}>{eur(c.capital)} · {c.taux}% · {c.dureeMois} mois</div>
              </div>
              <button onClick={() => remove(c.id)} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer" }}><Trash2 size={15} /></button>
            </div>

            {/* Barre de progression du remboursement */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, color: C.muted, marginBottom: 5 }}><span>Remboursé {pct}%</span><span>{payes} / {c.dureeMois} mensualités</span></div>
              <div style={{ height: 7, background: C.cardAlt, borderRadius: 4, overflow: "hidden" }}><div style={{ width: `${pct}%`, height: "100%", background: C.accent }} /></div>
            </div>

            <div style={{ display: "flex", gap: 20, flexWrap: "wrap", paddingTop: 14, borderTop: `1px solid ${C.border}` }}>
              <Metric label="Mensualité totale" value={eur2(mTot)} />
              <Metric label="dont assurance" value={eur2(c.assurance || 0)} />
              <Metric label="Capital restant" value={eur(restant)} />
              <Metric label="Mensualités restantes" value={restantes} />
              <Metric label="Intérêts totaux" value={eur(interets)} />
            </div>

            {next.length > 0 && (
              <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>Prochaines échéances</div>
                {next.map((e, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 13.5, padding: "5px 0" }}>
                    <span style={{ color: C.muted }}>{e.date.toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" })}</span>
                    <span style={{ fontWeight: 600 }}>{eur2(e.montant)}</span>
                  </div>
                ))}
              </div>
            )}
          </Card>
        );
      })}

      <div style={{ fontSize: 11.5, color: C.muted, marginTop: 8, lineHeight: 1.5 }}>
        Calculs indicatifs (prêt amortissable à mensualités constantes). Les montants réels figurant sur votre tableau d'amortissement bancaire font foi.
      </div>
    </div>
  );
}

function exporterDonnees(data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `gestion-locative-sauvegarde-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function slugify(nom) {
  const base = (nom || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "").slice(0, 16) || "locataire";
  return base;
}

function joursAvant(dateIso) {
  return Math.ceil((new Date(dateIso) - new Date()) / 86400000);
}
// Demandes prioritaires (RDV/urgence) sans réponse du proprio postérieure
function demandesEnAttente(data) {
  const out = [];
  Object.keys(data.locataires).forEach((key) => {
    const msgs = (data.messages || []).filter((m) => m.locataire === key).sort((a, b) => new Date(a.date) - new Date(b.date));
    for (let i = msgs.length - 1; i >= 0; i--) {
      const m = msgs[i];
      if (m.from === "proprio") break; // une réponse récente solde l'attente
      if (m.priorite) { out.push({ key, msg: m }); break; }
    }
  });
  return out.sort((a, b) => (a.msg.priorite === "urgence" ? -1 : 1));
}
function SortieBanner({ sortieDate }) {
  const j = joursAvant(sortieDate);
  const passe = j < 0;
  const proche = j >= 0 && j <= 30;
  const color = passe ? C.muted : proche ? C.warn : C.blue;
  const txt = passe ? `Sortie effectuée le ${formatDate(sortieDate)}` : `Sortie prévue le ${formatDate(sortieDate)} · dans ${j} jour${j > 1 ? "s" : ""}`;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 12, padding: "9px 12px", borderRadius: 8, background: passe ? C.cardAlt : `${color}1A`, border: `1px solid ${color}`, fontSize: 13, color, fontWeight: 600 }}>
      <CalendarClock size={15} /> {txt}
    </div>
  );
}

function HistoriquePaiements({ loc }) {
  const mois = [];
  const now = new Date();
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const p = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    const statut = statutPaiement(loc, p);
    mois.push({ p, statut, label: MONTHS[d.getMonth()][0] });
  }
  const col = { paye: C.accent, attente: C.warn, retard: C.danger };
  return (
    <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${C.border}` }}>
      <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>Historique 12 mois</div>
      <div style={{ display: "flex", gap: 5 }}>
        {mois.map((m) => (
          <div key={m.p} title={`${formatPeriod(m.p)} · ${m.statut}`} style={{ flex: 1, textAlign: "center" }}>
            <div style={{ height: 26, borderRadius: 4, background: col[m.statut], opacity: m.statut === "attente" ? 0.4 : 0.85 }} />
            <div style={{ fontSize: 9.5, color: C.muted, marginTop: 3 }}>{m.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

                catch { alert("Fichier invalide."); }

            }} />

  );
}

function ProprioFinances({ data, save }) {
  const keys = Object.keys(data.locataires);
  const [form, setForm] = useState({ cible: keys[0] ? `loc:${keys[0]}` : "", libelle: "", montant: "", date: new Date().toISOString().slice(0, 10) });
  const depenses = data.depenses || [];

  const addDep = (e) => {
    e.preventDefault();
    if (!form.libelle.trim() || !form.montant || !form.cible) return;
    const dep = { id: uid(), libelle: form.libelle.trim(), montant: Number(form.montant), date: form.date };
    if (form.cible.startsWith("bien:")) dep.bienId = form.cible.slice(5);
    else dep.locataire = form.cible.slice(4);
    save({ ...data, depenses: [...depenses, dep] });
    setForm({ ...form, libelle: "", montant: "" });
  };
  const removeDep = (id) => save({ ...data, depenses: depenses.filter((d) => d.id !== id) });

  // Cash-flow mensuel
  const loyersMensuels = Object.values(data.locataires).reduce((s, l) => s + l.loyer + (l.charges || 0), 0);
  const mensualitesCredit = (data.credits || []).reduce((s, c) => s + mensualite(c.capital, c.taux, c.dureeMois) + (c.assurance || 0), 0);
  const depensesAnnuelles = depenses.reduce((s, d) => s + d.montant, 0);
  const depensesMensuelles = depensesAnnuelles / 12;
  const cashflow = loyersMensuels - mensualitesCredit - depensesMensuelles;

  return (
    <div>
      <SectionTitle>Rentabilité mensuelle</SectionTitle>
      <Card style={{ marginBottom: 16 }}>
        <FinanceLine label="Loyers encaissés" value={`+ ${eur2(loyersMensuels)}`} color={C.accent} />
        <FinanceLine label="Mensualités de crédit" value={`− ${eur2(mensualitesCredit)}`} color={C.danger} />
        <FinanceLine label="Dépenses (lissées /mois)" value={`− ${eur2(depensesMensuelles)}`} color={C.danger} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 14, marginTop: 6, borderTop: `2px solid ${C.border}` }}>
          <span style={{ fontSize: 15, fontWeight: 600 }}>Cash-flow net</span>
          <span style={{ fontSize: 22, fontWeight: 700, color: cashflow >= 0 ? C.accent : C.danger }}>{cashflow >= 0 ? "+" : ""}{eur2(cashflow)}</span>
        </div>
        <div style={{ fontSize: 11.5, color: C.muted, marginTop: 8 }}>
          {cashflow >= 0 ? "Votre investissement s'autofinance et dégage un excédent mensuel." : "Votre effort d'épargne mensuel pour couvrir le bien."}
        </div>
      </Card>

      <SectionTitle>Détail par bien</SectionTitle>
      {Object.values(data.biens).map((bien) => {
        const locsBien = Object.values(data.locataires).filter((l) => l.bienId === bien.id);
        const keysBien = Object.entries(data.locataires).filter(([, l]) => l.bienId === bien.id).map(([k]) => k);
        const loyersBien = locsBien.reduce((s, l) => s + l.loyer + (l.charges || 0), 0);
        const creditBien = (data.credits || []).filter((c) => c.bienId === bien.id).reduce((s, c) => s + mensualite(c.capital, c.taux, c.dureeMois) + (c.assurance || 0), 0);
        // Dépenses du bien (niveau immeuble + logements du bien), lissées au mois
        const depBienAnnuel = (data.depenses || []).filter((d) => d.bienId === bien.id || keysBien.includes(d.locataire)).reduce((s, d) => s + d.montant, 0);
        const depBienMensuel = depBienAnnuel / 12;
        const netBien = loyersBien - creditBien - depBienMensuel;
        return (
          <Card key={bien.id} style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
              <Landmark size={15} color={C.blue} />
              <span style={{ fontSize: 14.5, fontWeight: 600 }}>{bien.nom}</span>
              <span style={{ fontSize: 11.5, color: C.muted }}>· {locsBien.length} logement(s)</span>
            </div>
            <FinanceLine label="Loyers du bien" value={`+ ${eur2(loyersBien)}`} color={C.accent} />
            {creditBien > 0 && <FinanceLine label="Crédit du bien" value={`− ${eur2(creditBien)}`} color={C.danger} />}
            {depBienMensuel > 0 && <FinanceLine label="Dépenses (lissées /mois)" value={`− ${eur2(depBienMensuel)}`} color={C.danger} />}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 12, marginTop: 4, borderTop: `1px solid ${C.border}` }}>
              <span style={{ fontSize: 14, fontWeight: 600 }}>Net mensuel</span>
              <span style={{ fontSize: 17, fontWeight: 700, color: netBien >= 0 ? C.accent : C.danger }}>{netBien >= 0 ? "+" : ""}{eur2(netBien)}</span>
            </div>
          </Card>
        );
      })}

      <SectionTitle>Ajouter une dépense</SectionTitle>
      <Card style={{ marginBottom: 24 }}>
        <form onSubmit={addDep}>
          <Field label="Concerne"><select value={form.cible} onChange={(e) => setForm({ ...form, cible: e.target.value })} style={inputStyle}>
            <optgroup label="Immeuble entier">{Object.values(data.biens).map((b) => <option key={b.id} value={`bien:${b.id}`}>{b.nom} (niveau immeuble)</option>)}</optgroup>
            <optgroup label="Logement">{Object.entries(data.locataires).map(([k, l]) => <option key={k} value={`loc:${k}`}>{l.logement} — {l.nom}</option>)}</optgroup>
          </select></Field>
          <Field label="Libellé"><input value={form.libelle} onChange={(e) => setForm({ ...form, libelle: e.target.value })} placeholder="Plombier, taxe foncière, assurance PNO…" style={inputStyle} /></Field>

            <Field label="Montant (€)"><input type="number" value={form.montant} onChange={(e) => setForm({ ...form, montant: e.target.value })} placeholder="120" style={inputStyle} /></Field>
            <Field label="Date"><input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} style={inputStyle} /></Field>
          </div>
          <PrimaryBtn type="submit" icon={Plus}>Enregistrer la dépense</PrimaryBtn>
        </form>
      </Card>

      <SectionTitle>Dépenses de l'immeuble</SectionTitle>
      {Object.values(data.biens).map((b) => {
        const list = depenses.filter((d) => d.bienId === b.id).sort((a, b2) => new Date(b2.date) - new Date(a.date));
        const sousTotal = list.reduce((s, d) => s + d.montant, 0);
        return (

            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: list.length ? 12 : 0 }}>
              <span style={{ fontSize: 14, fontWeight: 600, display: "flex", alignItems: "center", gap: 7 }}><Landmark size={14} color={C.blue} /> {b.nom}</span>
              {sousTotal > 0 && <span style={{ fontSize: 13, color: C.danger, fontWeight: 600 }}>{eur(sousTotal)}</span>}
            </div>
            {list.length === 0 ? <span style={{ color: C.muted, fontSize: 13 }}>Aucune dépense au niveau immeuble.</span> : list.map((d) => (
              <div key={d.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 0", borderTop: `1px solid ${C.border}` }}>
                <div><div style={{ fontSize: 14 }}>{d.libelle}</div><div style={{ fontSize: 11.5, color: C.muted }}>{formatDate(d.date)}</div></div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}><span style={{ fontSize: 14 }}>{eur(d.montant)}</span><button onClick={() => removeDep(d.id)} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer" }}><Trash2 size={14} /></button></div>
              </div>
            ))}
          </Card>
        );
      })}

      <div style={{ height: 8 }} />
      <SectionTitle>Dépenses par logement</SectionTitle>
      {Object.entries(data.locataires).map(([k, l]) => {
        const list = depenses.filter((d) => d.locataire === k).sort((a, b) => new Date(b.date) - new Date(a.date));
        const sousTotal = list.reduce((s, d) => s + d.montant, 0);
        return (
          <Card key={k} style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: list.length ? 12 : 0 }}>
              <span style={{ fontSize: 14, fontWeight: 600 }}>{l.logement} <span style={{ color: C.muted, fontWeight: 400 }}>· {l.nom}</span></span>
              {sousTotal > 0 && <span style={{ fontSize: 13, color: C.danger, fontWeight: 600 }}>{eur(sousTotal)}</span>}
            </div>
            {list.length === 0 ? <span style={{ color: C.muted, fontSize: 13 }}>Aucune dépense.</span> : list.map((d) => (
              <div key={d.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 0", borderTop: `1px solid ${C.border}` }}>
                <div><div style={{ fontSize: 14 }}>{d.libelle}</div><div style={{ fontSize: 11.5, color: C.muted }}>{formatDate(d.date)}</div></div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}><span style={{ fontSize: 14 }}>{eur(d.montant)}</span><button onClick={() => removeDep(d.id)} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer" }}><Trash2 size={14} /></button></div>

      })}
      <div style={{ fontSize: 11.5, color: C.muted, marginTop: 8, lineHeight: 1.5 }}>

function RegularisationCharges({ data, save }) {
  const [annee, setAnnee] = useState(new Date().getFullYear() - 1);
  const regul = data.regularisations || {};
  const setReel = (key, valeur) => {
    const k = `${key}:${annee}`;
    save({ ...data, regularisations: { ...regul, [k]: valeur } });
  };
  const anneesDispo = [];
  for (let y = new Date().getFullYear(); y >= new Date().getFullYear() - 4; y--) anneesDispo.push(y);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <SectionTitle>Régularisation des charges</SectionTitle>
        <select value={annee} onChange={(e) => setAnnee(Number(e.target.value))} style={{ ...inputStyle, width: "auto", fontSize: 13 }}>
          {anneesDispo.map((y) => <option key={y} value={y}>{y}</option>)}
        </select>
      </div>
      <div style={{ fontSize: 12.5, color: C.muted, marginBottom: 14, lineHeight: 1.5 }}>
        Comparez les provisions encaissées (charges mensuelles × 12) au coût réel des charges récupérables. Le solde indique ce que vous devez rembourser au locataire ou lui réclamer.
      </div>
      {Object.entries(data.locataires).map(([key, l]) => {
        const provisions = (l.charges || 0) * 12;
        const reel = regul[`${key}:${annee}`] || "";
        const reelNum = Number(reel) || 0;
        const solde = provisions - reelNum;
        return (
          <Card key={key} style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>{l.nom} <span style={{ color: C.muted, fontWeight: 400 }}>· {l.logement}</span></div>
            <FinanceLine label={`Provisions encaissées (${l.charges || 0} € × 12)`} value={eur2(provisions)} color={C.accent} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", fontSize: 14 }}>
              <span style={{ color: C.muted }}>Charges réelles {annee}</span>
              <input type="number" value={reel} onChange={(e) => setReel(key, e.target.value)} placeholder="0" style={{ ...inputStyle, width: 120, textAlign: "right", padding: "7px 10px" }} />
            </div>
            {reel !== "" && (
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 12, marginTop: 4, borderTop: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 14, fontWeight: 600 }}>{solde >= 0 ? "À rembourser au locataire" : "À réclamer au locataire"}</span>
                <span style={{ fontSize: 17, fontWeight: 700, color: solde >= 0 ? C.warn : C.accent }}>{eur2(Math.abs(solde))}</span>
              </div>
            )}
          </Card>
        );
      })}
    </div>
  );
}
function FinanceLine({ label, value, color }) {
  return <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontSize: 14 }}><span style={{ color: C.muted }}>{label}</span><span style={{ color: color || C.text, fontWeight: 500 }}>{value}</span></div>;
}

function ProprioEcheancier({ data }) {
  const now = new Date();
  const events = [];

  // Prochaine occurrence annuelle d'une date (mois/jour) à partir d'aujourd'hui
  const prochaineAnnuelle = (mois, jour) => {
    let d = new Date(now.getFullYear(), mois, jour);
    if (d < now) d = new Date(now.getFullYear() + 1, mois, jour);
    return d;
  };

  Object.entries(data.locataires).forEach(([key, l]) => {
    // Révision IRL à la date anniversaire d'entrée
    if (l.entreeDate) {
      const e = new Date(l.entreeDate);
      const d = prochaineAnnuelle(e.getMonth(), e.getDate());
      events.push({ date: d, type: "IRL", titre: `Révision de loyer (IRL) — ${l.nom}`, note: l.logement, color: C.blue });
    }
    // Sortie prévue
    if (l.sortieDate && new Date(l.sortieDate) >= now) {
      events.push({ date: new Date(l.sortieDate), type: "Sortie", titre: `Fin de bail — ${l.nom}`, note: l.logement, color: C.warn });
    }
  });

  // Travaux à venir (date prévue)
  (data.travaux || []).forEach((t) => {
    if (t.datePrevue && new Date(t.datePrevue) >= now && t.statut !== "termine") {
      const loc = data.locataires[t.locataire];
      events.push({ date: new Date(t.datePrevue), type: "Travaux", titre: t.titre, note: loc?.logement || "", color: t.priorite === "urgent" ? C.danger : C.accent });
    }
  });

  // Rappels annuels déduits des dépenses récurrentes (taxe foncière, assurance, charges)
  (data.depenses || []).forEach((dep) => {
    const lib = dep.libelle.toLowerCase();
    if (lib.includes("taxe") || lib.includes("assurance") || lib.includes("charge")) {
      const d0 = new Date(dep.date);
      const d = prochaineAnnuelle(d0.getMonth(), d0.getDate());
      events.push({ date: d, type: "Charge annuelle", titre: dep.libelle, note: `≈ ${eur(dep.montant)}`, color: C.muted });
    }
  });

  events.sort((a, b) => a.date - b.date);

  return (
    <div>
      <SectionTitle>Échéances à venir</SectionTitle>
      {events.length === 0 ? <Card><span style={{ color: C.muted, fontSize: 14 }}>Aucune échéance à afficher. Renseignez les dates d'entrée, de sortie ou de travaux pour alimenter l'échéancier.</span></Card> : events.map((ev, i) => {
        const j = Math.ceil((ev.date - now) / 86400000);
        const proche = j <= 30;
        return (
          <Card key={i} style={{ marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: ev.color, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 3 }}>{ev.type}</div>
                <div style={{ fontSize: 14.5, fontWeight: 600 }}>{ev.titre}</div>
                {ev.note && <div style={{ fontSize: 12.5, color: C.muted, marginTop: 2 }}>{ev.note}</div>}
              </div>
              <div style={{ textAlign: "right", whiteSpace: "nowrap" }}>
                <div style={{ fontSize: 13.5, fontWeight: 600 }}>{formatDate(ev.date.toISOString())}</div>
                <div style={{ fontSize: 12, color: proche ? C.warn : C.muted, fontWeight: proche ? 600 : 400 }}>dans {j} j</div>
              </div>
            </div>
          </Card>
        );
      })}
      <div style={{ fontSize: 11.5, color: C.muted, marginTop: 8, lineHeight: 1.5 }}>
        Les rappels de charges annuelles (taxe foncière, assurance…) sont déduits de vos dépenses passées et reproposés un an plus tard.
      </div>
    </div>
  );
}

      </Card>
      <div style={{ fontSize: 11.5, color: C.muted, marginTop: 10, lineHeight: 1.5 }}>
        Le document « Aide déclaration 2044 » indique, ligne par ligne, les montants à recopier dans votre déclaration en ligne sur impots.gouv.fr. Conservez les justificatifs ci-dessus en cas de contrôle. Indicatif — vérifiez votre situation avec un comptable.
      </div>
    </div>
  );
}

function ProprioMessages({ data, save, relanceTo, clearRelance }) {
  const keys = Object.keys(data.locataires);
  const [active, setActive] = useState(relanceTo || keys[0]);
  const [relance, setRelance] = useState(null);

  useEffect(() => {
    if (relanceTo) {
      setActive(relanceTo);
      const loc = data.locataires[relanceTo];
      const total = loc.loyer + (loc.charges || 0);
      setRelance(`Bonjour ${loc.nom.split(" ")[0]},\n\nSauf erreur de ma part, je n'ai pas encore reçu le règlement du loyer de ${formatPeriod(currentPeriod())} (${total} €). Pourriez-vous me confirmer la date de paiement ? Merci d'avance.\n\nCordialement.`);
      clearRelance && clearRelance();
    }
  }, [relanceTo]);

  return (
    <div>
      <SectionTitle>Messages</SectionTitle>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        {keys.map((k) => {
          const count = (data.messages || []).filter((m) => m.locataire === k && m.from === "locataire").length;
          return <button key={k} onClick={() => setActive(k)} style={{ background: active === k ? C.accentDark : C.card, border: `1px solid ${active === k ? C.accent : C.border}`, color: active === k ? C.accent : C.text, padding: "8px 14px", borderRadius: 30, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}><User size={13} /> {data.locataires[k].nom}{count ? ` · ${count}` : ""}</button>;
        })}
      </div>
      <Chat data={data} save={save} locKey={active} me="proprio" prefill={relance} onPrefillUsed={() => setRelance(null)} />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
</html>
